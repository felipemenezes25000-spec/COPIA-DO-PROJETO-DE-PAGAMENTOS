name: Deploy RenoveJá+ AWS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: renoveja-api
  ECS_CLUSTER: renoveja-prod
  ECS_SERVICE: renoveja-api
  S3_FRONTEND_BUCKET: renoveja-frontend-web
  CF_DISTRIBUTION_ID: EXWM1ERYI9GZL

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Gate: testes apenas no workflow_dispatch (CI já validou no workflow_run) ─
  test-gate:
    name: Test Gate (manual deploy)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.204"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Backend — build + test
        working-directory: backend-dotnet
        run: |
          dotnet restore
          dotnet build -c Release --no-restore
          dotnet test -c Release --no-build --verbosity normal

      - name: Frontend Web — lint + test
        working-directory: frontend-web
        run: |
          npm ci
          npm run lint
          npm run test:run

      - name: Frontend Mobile — lint + typecheck + test
        working-directory: frontend-mobile
        run: |
          npm ci
          npx tsc --noEmit
          npm run lint
          npm test -- --no-coverage

  # ── Deploy Backend (ECS) ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (ECS)
    runs-on: ubuntu-latest
    needs: [test-gate]
    # Roda após test-gate (dispatch) OU direto quando CI passou (workflow_run)
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && needs.test-gate.result == 'success') ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      )
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f backend-dotnet/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Render task definition (substitute placeholders + image tag)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          # Substitute __ACCOUNT_ID__ placeholders, then inject the resolved image via jq.
          sed "s|__ACCOUNT_ID__|${ACCOUNT_ID}|g" infra/task-definition.json > infra/task-definition.tmp.json
          jq --arg img "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $img' \
            infra/task-definition.tmp.json > infra/task-definition.json
          rm -f infra/task-definition.tmp.json

      - name: Register Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://infra/task-definition.json \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition renoveja-api \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for Deployment
        run: |
          echo "Waiting for ECS service to stabilize (timeout ~15 min)..."
          for i in $(seq 1 60); do
            STATUS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].deployments[0].rolloutState" --output text)
            RUNNING=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].runningCount" --output text)
            DESIRED=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].desiredCount" --output text)
            DEPLOY_COUNT=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "length(services[0].deployments)" --output text)
            echo "[$i/60] Status=$STATUS Running=$RUNNING Desired=$DESIRED Deployments=$DEPLOY_COUNT"
            if [ "$STATUS" = "COMPLETED" ] && [ "$RUNNING" = "$DESIRED" ] && [ "$DEPLOY_COUNT" = "1" ]; then
              echo "Deployment complete!"
              exit 0
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "Deployment FAILED!"
              aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].events[0:5]" --output table
              exit 1
            fi
            sleep 15
          done
          echo "Timeout - showing recent events:"
          aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION --query "services[0].events[0:5]" --output table
          exit 1

  # ── Deploy Frontend (S3/CloudFront) ───────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (S3/CloudFront)
    runs-on: ubuntu-latest
    needs: [test-gate]
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && needs.test-gate.result == 'success') ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      )
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          echo "VITE_API_URL=https://api.renovejasaude.com.br" > .env.production

      - name: Build
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        # CI is the source of truth for this bucket; --delete is safe here
        # because the build artifact in dist/ fully represents the desired state.
        run: |
          aws s3 sync dist/ s3://$S3_FRONTEND_BUCKET --delete
          aws s3 sync dist/ s3://$S3_FRONTEND_BUCKET --exclude "*" --include "*.js" --content-type "application/javascript"
          aws s3 sync dist/ s3://$S3_FRONTEND_BUCKET --exclude "*" --include "*.css" --content-type "text/css"
          aws s3 cp s3://$S3_FRONTEND_BUCKET/index.html s3://$S3_FRONTEND_BUCKET/index.html --metadata-directive REPLACE --cache-control "no-cache" --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_DISTRIBUTION_ID \
            --paths "/*"

  # ── Deploy RH Portal (rh-renoveja → S3/CloudFront) ────────────────────────
  deploy-rh-renoveja:
    name: Deploy RH Portal (S3/CloudFront)
    runs-on: ubuntu-latest
    needs: [test-gate]
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && needs.test-gate.result == 'success') ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      )
    env:
      S3_RH_BUCKET: renoveja-rh-web
      CF_RH_DISTRIBUTION_ID: E1YMDNM6T4HTIO
    defaults:
      run:
        working-directory: rh-renoveja
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: rh-renoveja/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Create .env.production
        # Vite congela import.meta.env.* em build-time; sem VITE_GOOGLE_CLIENT_ID
        # aqui, o gate condicional em main.tsx esconde o <GoogleLogin /> no bundle
        # final e o botão "Continuar com Google" não renderiza em produção.
        run: |
          echo "VITE_API_URL=https://api.renovejasaude.com.br" > .env.production
          echo "VITE_OPENAI_API_KEY=${{ secrets.VITE_OPENAI_API_KEY }}" >> .env.production
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env.production

      - name: Build
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        # CI is the source of truth for this bucket; --delete is safe here
        # because the build artifact in dist/ fully represents the desired state.
        run: |
          aws s3 sync dist/ s3://$S3_RH_BUCKET --delete
          aws s3 sync dist/ s3://$S3_RH_BUCKET --exclude "*" --include "*.js" --content-type "application/javascript"
          aws s3 sync dist/ s3://$S3_RH_BUCKET --exclude "*" --include "*.css" --content-type "text/css"
          aws s3 cp s3://$S3_RH_BUCKET/index.html s3://$S3_RH_BUCKET/index.html --metadata-directive REPLACE --cache-control "no-cache" --content-type "text/html"
          aws s3 cp s3://$S3_RH_BUCKET/404.html s3://$S3_RH_BUCKET/404.html --metadata-directive REPLACE --cache-control "no-cache" --content-type "text/html" || true

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CF_RH_DISTRIBUTION_ID \
            --paths "/*"
