<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste Push Notifications - RenoveJá</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .block { margin: 1rem 0; }
    input[type="text"], input[type="password"] { width: 100%; box-sizing: border-box; padding: 0.5rem; margin: 0.25rem 0; }
    button { padding: 0.5rem 1rem; margin-right: 0.5rem; margin-top: 0.5rem; cursor: pointer; }
    .result { white-space: pre-wrap; background: #f5f5f5; padding: 1rem; border-radius: 8px; font-size: 12px; margin-top: 0.5rem; }
    .error { background: #ffebee; color: #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .info { background: #e3f2fd; color: #1565c0; }
  </style>
</head>
<body>
  <h1>Teste de Push Notifications</h1>
  <p>Faça login e clique em "Testar push" para enviar um push de teste ao seu dispositivo.</p>
  <p class="info" style="padding: 0.5rem; border-radius: 6px; font-size: 13px;">
    <strong>Requisito:</strong> O app mobile deve estar logado no mesmo usuário e ter registrado o token de push (Configurações → aceitar notificações).
  </p>

  <div class="block">
    <strong>1. Login</strong><br>
    <label>URL da API: <input type="text" id="apiUrl" value="https://ola-jamal.onrender.com" style="width: 100%;"></label><br>
    <label>E-mail: <input type="text" id="email" placeholder="seu@email.com"></label><br>
    <label>Senha: <input type="password" id="password" placeholder="sua senha"></label><br>
    <button id="loginBtn">Fazer login</button>
    <div id="loginResult" class="result" style="display: none;"></div>
  </div>

  <div class="block">
    <strong>2. Testar push</strong><br>
    <button id="testPushBtn" disabled>Testar push</button>
    <div id="pushResult" class="result" style="display: none;"></div>
  </div>

  <script>
    const apiUrlEl = document.getElementById('apiUrl');
    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const loginResultEl = document.getElementById('loginResult');
    const testPushBtn = document.getElementById('testPushBtn');
    const pushResultEl = document.getElementById('pushResult');

    let bearerToken = null;

    function show(el, text, type) {
      el.style.display = 'block';
      el.textContent = text;
      el.className = 'result ' + (type || '');
    }

    loginBtn.onclick = async () => {
      const base = apiUrlEl.value.replace(/\/$/, '');
      try {
        const res = await fetch(base + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailEl.value, password: passwordEl.value })
        });
        const data = await res.json();
        if (!res.ok) {
          show(loginResultEl, JSON.stringify(data, null, 2), 'error');
          return;
        }
        bearerToken = data.token;
        show(loginResultEl, 'Login OK. Token obtido. Clique em "Testar push".', 'success');
        testPushBtn.disabled = false;
      } catch (e) {
        show(loginResultEl, 'Erro: ' + e.message, 'error');
      }
    };

    testPushBtn.onclick = async () => {
      if (!bearerToken) return;
      const base = apiUrlEl.value.replace(/\/$/, '');
      testPushBtn.disabled = true;
      pushResultEl.style.display = 'none';
      try {
        const res = await fetch(base + '/api/push-tokens/test', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + bearerToken
          }
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          show(pushResultEl, (data.message || 'Push enviado!') + '\n\nVerifique seu dispositivo (app deve estar em development build, não Expo Go).', 'success');
        } else {
          show(pushResultEl, 'Erro ' + res.status + ': ' + (data.message || res.statusText) + '\n\n' + JSON.stringify(data, null, 2), 'error');
        }
      } catch (e) {
        show(pushResultEl, 'Erro de rede: ' + e.message, 'error');
      }
      testPushBtn.disabled = false;
    };
  </script>
</body>
</html>
